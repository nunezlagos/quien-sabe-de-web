# Producción VPS — sin Caddy (vía domain-caddy), app en domain_internal + qs_internal.
# Usado por: make up / make down
services:
  mysql:
    image: mysql:8.0
    container_name: qs-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - qs_internal

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: qs-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - qs_internal

  minio-bootstrap:
    image: minio/mc:latest
    container_name: qs-minio-bootstrap
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing local/"$$MINIO_BUCKET"
        mc anonymous set download local/"$$MINIO_BUCKET"
    networks:
      - qs_internal
    restart: "no"

  app:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: qs-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_USE_SSL: "false"
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL}
      NODE_ENV: ${NODE_ENV}
      PORT: "4323"
      HOST: "0.0.0.0"
    expose:
      - "4323"
    networks:
      - qs_internal
      - domain_internal

volumes:
  mysql_data:
    name: qs_mysql_data
  minio_data:
    name: qs_minio_data

networks:
  qs_internal:
    name: qs_internal
    driver: bridge
  domain_internal:
    name: domain_internal
    external: true