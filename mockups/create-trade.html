<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Nuevo Oficio - Quién Sabe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2E8B57',
                        'primary-dark': '#1f633d',
                        accent: '#FF7F50',
                        'bg-light': '#eaeff2',
                    },
                    fontFamily: {
                        sans: ['Nunito', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bg-light font-sans">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold text-gray-800 flex items-center gap-2">
                <i class="ri-community-line text-primary"></i>
                Quién<span class="text-primary">Sabe</span>
            </a>
            <a href="dashboard-user.html" class="text-sm text-gray-500 hover:text-primary font-bold">Cancelar</a>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 max-w-2xl">
        
        <div class="text-center mb-8">
            <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-3 text-primary text-2xl">
                <i class="ri-briefcase-line"></i>
            </div>
            <h1 class="text-2xl font-extrabold text-gray-800">Ofrece tus servicios</h1>
            <p class="text-gray-500 text-sm">Completa tu perfil profesional.</p>
        </div>

        <form action="dashboard-provider.html" class="space-y-6">
            <!-- Step 1: Basic Info -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="font-bold text-gray-800 text-base mb-4 border-b border-gray-100 pb-2">1. Información Básica</h3>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">Nombre Visible</label>
                        <input type="text" placeholder="Ej: Juan Pérez" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/50 transition">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">Oficio</label>
                        <select class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/50 transition">
                            <option value="">Selecciona tu oficio...</option>
                            <option value="gasfiter">Gasfiter</option>
                            <option value="electricista">Electricista</option>
                            <option value="jardinero">Jardinero</option>
                            <option value="maestro">Maestro</option>
                            <option value="costurera">Costurera</option>
                            <option value="otro">Otro</option>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-gray-700 mb-1">Descripción Corta (Bio)</label>
                        <textarea rows="2" placeholder="Cuenta brevemente tu experiencia..." class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/50 transition"></textarea>
                    </div>
                </div>
            </div>

            <!-- Step 2: Contact & Price -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="font-bold text-gray-800 text-base mb-4 border-b border-gray-100 pb-2">2. Contacto y Precios</h3>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">WhatsApp</label>
                        <div class="relative">
                            <span class="absolute left-3 top-2 text-gray-400 text-sm">+56 9</span>
                            <input type="tel" placeholder="12345678" class="w-full bg-gray-50 border border-gray-200 rounded-lg pl-14 pr-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/50 transition">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">Precio Base</label>
                        <div class="relative">
                            <span class="absolute left-3 top-2 text-gray-400 text-sm">$</span>
                            <input type="number" placeholder="10000" class="w-full bg-gray-50 border border-gray-200 rounded-lg pl-6 pr-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/50 transition">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Step 3: Verification -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="font-bold text-gray-800 text-base mb-4 border-b border-gray-100 pb-2">3. Verificación</h3>
                
                <div class="border-2 border-dashed border-gray-200 rounded-xl p-6 text-center hover:border-primary hover:bg-green-50 transition cursor-pointer">
                    <i class="ri-file-upload-line text-2xl text-gray-300 mb-1"></i>
                    <p class="text-xs text-gray-600 font-bold">Subir Certificado</p>
                </div>
            </div>

            <div class="flex gap-3 pt-2">
                <a href="dashboard-user.html" class="flex-1 py-3 rounded-xl text-center font-bold text-gray-500 hover:bg-gray-100 transition text-sm flex items-center justify-center">Volver</a>
                <button type="submit" class="flex-[2] bg-primary text-white py-3 rounded-xl font-bold hover:bg-primary-dark transition shadow-md text-sm">
                    Crear Perfil
                </button>
            </div>
        </form>

    </main>

    <script src="script.js"></script>
</body>
</html>
