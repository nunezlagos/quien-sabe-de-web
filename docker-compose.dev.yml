name: quien-sabe-de-web

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: quien-sabe-app
    ports:
      - "4323:4323"
    volumes:
      # Source code mount para hot reload (Vite watch)
      - ./src:/app/src
      - ./public:/app/public
      - ./tests:/app/tests
      - ./vitest.config.ts:/app/vitest.config.ts
      - ./astro.config.mjs:/app/astro.config.mjs
      - ./tsconfig.json:/app/tsconfig.json
      - ./drizzle.config.ts:/app/drizzle.config.ts
      # node_modules dentro del container (no sobreescribir con el host)
      - app_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - HOST=0.0.0.0
      - PORT=4323
      # Servicios internos del compose
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=quien-sabe-files
    env_file:
      - path: .env
        required: false
    depends_on:
      mailpit:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - quien-sabe-net

  mailpit:
    image: axllent/mailpit:latest
    container_name: quien-sabe-mailpit
    restart: unless-stopped
    ports:
      - "8026:8025"  # Web UI
      - "1028:1025"  # SMTP
    environment:
      - MP_MAX_MESSAGES=5000
      - MP_SMTP_AUTH_ACCEPT_ANY=1
      - MP_SMTP_AUTH_ALLOW_INSECURE=1
    networks:
      - quien-sabe-net

  minio:
    image: minio/minio:latest
    container_name: quien-sabe-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"  # S3 API
      - "9003:9001"  # Console
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quien-sabe-net

  # Crea el bucket por defecto al levantar el stack
  minio-init:
    image: minio/mc:latest
    container_name: quien-sabe-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/quien-sabe-files;
      mc anonymous set download local/quien-sabe-files;
      echo 'Bucket quien-sabe-files listo';
      "
    networks:
      - quien-sabe-net

volumes:
  app_node_modules:
  minio_data:

networks:
  quien-sabe-net:
    driver: bridge
