name: Deploy — Production (VPS, signed tag)
on:
  push:
    tags: ['v*']

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  verify-tag:
    runs-on: ubuntu-latest
    outputs:
      signed: ${{ steps.check-signature.outputs.signed }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - id: check-signature
        run: |
          if git tag -v ${{ github.ref_name }} 2>/dev/null; then
            echo "signed=true" >> $GITHUB_OUTPUT
          else
            echo "signed=false" >> $GITHUB_OUTPUT
            exit 1
          fi

  deploy:
    needs: verify-tag
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/quien-sabe
            git fetch --tags origin
            git checkout ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            make restart
            sleep 5
            curl -fsS http://localhost:4323/api/v1/health || echo "health endpoint not ready yet"
      - name: Smoke test (public)
        if: success()
        run: |
          curl -f -s -o /dev/null -w "%{http_code}" "https://quien-sabe.cl/api/v1/health" | grep -q 200
      - name: Notify Discord
        if: always()
        uses: tsickert/discord-webhook@v6
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          content: "🚀 Production deploy ${{ github.ref_name }} — ${{ job.status }} — ${{ github.sha }}"