# Vhost para producción — montado en /opt/services/services/caddy/Caddyfile
# de domain-services (línea adicional al inicio del archivo).
# Reload: docker kill -s SIGHUP domain-caddy

quiensabe.cl, www.quiensabe.cl {
    reverse_proxy qs-app:4323

    encode zstd gzip

    header {
        X-Content-Type-Options "nosniff"
        Referrer-Policy "strict-origin-when-cross-origin"
    }

    # assets estaticos: cache agresivo (imagenes del collage + bundles hasheados de astro)
    @static path /images/* /_astro/*
    header @static Cache-Control "public, max-age=31536000, immutable"
}